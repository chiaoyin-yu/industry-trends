<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 時代產業趨勢儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root[data-theme="dark"] {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #f1f5f9; --text2: #94a3b8;
    --primary: #6366f1; --growth: #10b981;
    --warning: #f59e0b; --danger: #ef4444;
    --border: #334155;
  }
  :root[data-theme="light"] {
    --bg: #f8fafc; --bg2: #ffffff; --bg3: #e2e8f0;
    --text: #0f172a; --text2: #64748b;
    --primary: #4f46e5; --growth: #059669;
    --warning: #d97706; --danger: #dc2626;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
  .header-meta { color: var(--text2); font-size: 0.875rem; }
  .theme-btn { background: var(--bg3); border: none; color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .card-value { font-size: 2rem; font-weight: 700; }
  .card-value.primary { color: var(--primary); }
  .card-value.growth { color: var(--growth); }
  .card-value.warning { color: var(--warning); }
  .card-value.danger { color: var(--danger); }
  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--text); }
  .chart-container { position: relative; height: 280px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 0.75rem; color: var(--text2); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.875rem; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
  .badge-high { background: rgba(239,68,68,0.15); color: var(--danger); }
  .badge-medium { background: rgba(245,158,11,0.15); color: var(--warning); }
  .badge-low { background: rgba(16,185,129,0.15); color: var(--growth); }
  .badge-up { background: rgba(99,102,241,0.15); color: var(--primary); }
  .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag { padding: 6px 14px; border-radius: 999px; font-size: 0.8rem; font-weight: 500; }
  .risk-card { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .risk-card h4 { color: var(--danger); margin-bottom: 6px; }
  .risk-card p { font-size: 0.875rem; color: var(--text2); margin-bottom: 4px; }
  .advice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .advice-card { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 8px; padding: 16px; font-size: 0.875rem; }
  .advice-num { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .timeline { }
  .timeline-item { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .timeline-header { padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .timeline-header:hover { background: var(--bg3); }
  .timeline-date { font-weight: 600; }
  .timeline-arrow { color: var(--text2); transition: transform 0.2s; }
  .timeline-body { display: none; padding: 16px; border-top: 1px solid var(--border); background: var(--bg); }
  .timeline-body.open { display: block; }
  .news-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; }
  .news-title { font-weight: 500; margin-bottom: 4px; }
  .news-meta { font-size: 0.8rem; color: var(--text2); }
  @media (max-width: 640px) { h1 { font-size: 1.3rem; } .card-value { font-size: 1.5rem; } }
</style>
</head>
<body>
<div class="container">

    <div>
      <h1>📊 AI 時代產業趨勢儀表板</h1>

    </div>
    <button class="theme-btn" onclick="toggleTheme()">🌓 切換主題</button>
  </header>

  <div class="cards">
    <div class="card"><div class="card-label">今日熱門產業</div><div class="card-value primary" id="hotCount">-</div></div>
    <div class="card"><div class="card-label">分析職缺數</div><div class="card-value growth" id="jobCount">-</div></div>
    <div class="card"><div class="card-label">AI 高衝擊職缺</div><div class="card-value danger" id="aiHighCount">-</div></div>
    <div class="card"><div class="card-label">行動建議</div><div class="card-value warning" id="adviceCount">-</div></div>
  </div>

  <div class="section">
    <h2>🏭 產業熱度分析</h2>
    <div class="chart-container"><canvas id="industryChart"></canvas></div>
  </div>

  <div class="section">
    <h2>💼 熱門職缺排行榜（今日）</h2>

      <tbody id="jobsTable"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>🛠️ 技能需求分析</h2>
    <div class="chart-container"><canvas id="skillsChart"></canvas></div>
  </div>

  <div class="section">
    <h2>⚠️ AI 衝擊警示區</h2>
    <div id="riskCards"></div>
  </div>

  <div class="section">
    <h2>🚀 給年輕人的行動建議</h2>
    <div class="advice-grid" id="adviceGrid"></div>
  </div>

  <div class="section">
    <h2>📰 近期新聞要點</h2>
    <div id="newsList"></div>
  </div>

  <div class="section">
    <h2>🕐 歷史更新時間軸</h2>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

const LAST_UPDATED = "2026-06-12";

function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  renderCharts();
}

function getColor(name) {
  return getComputedStyle(document.documentElement).getPropertyValue('--' + name).trim();
}

let industryChartInst, skillsChartInst;

function render() {
  if (!REPORT_DATA.length) return;
  const d = REPORT_DATA[0];
  document.getElementById('lastUpdated').textContent = d.date;
  document.getElementById('totalUpdates').textContent = REPORT_DATA.length;
  document.getElementById('hotCount').textContent = d.summary.hotIndustries.length;
  document.getElementById('jobCount').textContent = d.hotJobs.length;
  document.getElementById('aiHighCount').textContent = d.summary.aiHighImpactCount || d.hotJobs.filter(j=>j.aiImpact==='high').length;
  document.getElementById('adviceCount').textContent = d.actionableAdvice.length;

  const tbody = document.getElementById('jobsTable');
  tbody.innerHTML = d.hotJobs.map(j => `
    <tr>
      <td>${j.rank}</td>
      <td><strong>${j.title}</strong></td>
      <td>${j.industry}</td>
      <td>${j.salaryRange}</td>
      <td>${j.keySkills.map(s=>`<span class="badge badge-low">${s}</span>`).join(' ')}</td>
      <td><span class="badge badge-${j.aiImpact}">${j.aiImpact==='high'?'高' : j.aiImpact==='medium'?'中':'低'}</span></td>
      <td>${j.trend==='up'?'⬆️':j.trend==='down'?'⬇️':'➡️'}</td>
    </tr>`).join('');

  document.getElementById('riskCards').innerHTML = (d.aiHighRisk||[]).map(r=>`
    <div class="risk-card">
      <h4>⚠️ ${r.job}</h4>
      <p><strong>風險原因：</strong>${r.reason}</p>
      <p><strong>轉型建議：</strong>${r.suggestion}</p>
    </div>`).join('');

  document.getElementById('adviceGrid').innerHTML = d.actionableAdvice.map((a,i)=>`
    <div class="advice-card"><div class="advice-num">${i+1}</div>${a}</div>`).join('');

  document.getElementById('newsList').innerHTML = (d.newsHighlights||[]).map(n=>`
    <div class="news-item">
      <div class="news-title">${n.title}</div>
      <div class="news-meta">${n.summary}｜<em>影響：${n.impact}</em></div>
    </div>`).join('');

  document.getElementById('timeline').innerHTML = REPORT_DATA.map((day,i)=>`
    <div class="timeline-item">
      <div class="timeline-header" onclick="toggleTimeline(${i})">
        <span class="timeline-date">${day.date}</span>
        <span>熱門：${day.summary.hotIndustries.slice(0,2).join('、')} ｜ 分析 ${day.hotJobs.length} 個職缺 <span class="timeline-arrow" id="arrow-${i}">▼</span></span>
      </div>
      <div class="timeline-body" id="body-${i}">
        <strong>行動建議：</strong><ol>${day.actionableAdvice.map(a=>`<li>${a}</li>`).join('')}</ol>
      </div>
    </div>`).join('');

  renderCharts();
}

function toggleTimeline(i) {
  const body = document.getElementById('body-'+i);
  const arrow = document.getElementById('arrow-'+i);
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function renderCharts() {
  if (!REPORT_DATA.length) return;
  const d = REPORT_DATA[0];
  const primary = '#6366f1', growth = '#10b981', warning = '#f59e0b', danger = '#ef4444';
  const textColor = document.documentElement.getAttribute('data-theme')==='dark' ? '#94a3b8' : '#64748b';
  const gridColor = document.documentElement.getAttribute('data-theme')==='dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

  if (industryChartInst) industryChartInst.destroy();
  const allIndustries = [...d.summary.hotIndustries.map(i=>({name:i,type:'hot'})), ...((d.summary.decliningIndustries||[]).map(i=>({name:i,type:'decline'})))];
  industryChartInst = new Chart(document.getElementById('industryChart'), {
    type: 'bar',
    data: {
      labels: allIndustries.map(i=>i.name),
      datasets: [{
        label: '熱度指數',
        data: allIndustries.map((i,idx)=> i.type==='hot' ? (allIndustries.length-idx)*10 : (idx-allIndustries.length)*5),
        backgroundColor: allIndustries.map(i=> i.type==='hot' ? growth : danger),
        borderRadius: 6
      }]
    },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:gridColor},ticks:{color:textColor}},y:{grid:{display:false},ticks:{color:textColor}}} }
  });

  if (skillsChartInst) skillsChartInst.destroy();
  const topSkills = (d.skillsAnalysis||[]).slice(0,10);
  skillsChartInst = new Chart(document.getElementById('skillsChart'), {
    type: 'bar',
    data: {
      labels: topSkills.map(s=>s.skill),
      datasets: [{
        label: '需求熱度',
        data: topSkills.map(s=>s.demand),
        backgroundColor: topSkills.map(s=> s.category==='tech'?primary : s.category==='soft'?warning : growth),
        borderRadius: 6
      }]
    },
